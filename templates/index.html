<html>
<head>
    <title>Book Reviews</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<input type="text" id="searchBox" placeholder="Search by title or author">
<button onclick="searchBooks()">Search</button>

<header class="navbar">
    <h1 class="highlight-title">
        <span>MY</span>
        <span>BOOK</span>
        <span>SHELF</span>
    </h1>
</header>

<!-- WRITE REVIEW (UPDATED STYLE) -->
<div id="addReview">
    <h2 class="review-title">WRITE A REVIEW</h2>

    <input type="text" id="reviewBookTitle" placeholder="Book Title">
    <input type="text" id="reviewUser" placeholder="Your Name">
    <input type="number" id="reviewRating" placeholder="Rating (1-5)">
    <input type="text" id="reviewComment" placeholder="Comment">

    <button onclick="submitReview()">Submit Review</button>
</div>

<!-- ONLY ONE BUTTON -->
<button onclick="toggleReviews()">Show Reviews</button>

<!-- SINGLE REVIEW CONTAINER -->
<div id="reviewsList" class="reviews-list"></div>

<!-- ADD BOOK -->
<div id="addBook">
    <h2 class="add-book-title">ADD A BOOK</h2>

    <div class="book-inputs-row">
        <input type="text" id="bookTitle" placeholder="Book Title">
        <input type="text" id="publicationYear" placeholder="Publication Year">
        <input type="text" id="authorName" placeholder="Author Name">
        <input type="text" id="imageURL" placeholder="Book Image URL">
        <button onclick="addBook()">Add</button>
    </div>
</div>

<button id="showBooksButton" onclick="showAllBooks()">Show All Books</button>

<div id="bookshelf" class="bookshelf"></div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
