<html>

<head>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
    <title>Book Reviews</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">

</head>

<body>
    <input type="text" id="searchBox" placeholder="Search by title or author">
    <button onclick="searchBooks()">Search</button>
    
    <header class="navbar">
<h1 class="highlight-title">
  <span>MY</span>
  <span>BOOK</span>
  <span>SHELF</span>
</h1>
    </header>
    
<!-- Button to show reviews -->
<button id="showReviewsButton" onclick="showReviews()">BOOK REVIEWS - UPDATE</button>

<!-- Div to display reviews -->
<div id="reviewsList" class="reviews-list">
    <!-- Reviews will appear here dynamically -->
</div>

    <!-- Add a div to input book data -->
<div id="addBook">
    <h2 class="add-book-title">ADD A BOOK</h2>
    <!-- Inputs in a row -->
    <div class="book-inputs-row">
        <input type="text" id="bookTitle" placeholder="Book Title">
        <input type="text" id="publicationYear" placeholder="Publication Year">
        <input type="text" id="authorName" placeholder="Author Name">
        <input type="text" id="imageURL" placeholder="Book Image URL">
        <button onclick="addBook()">Add</button>
    </div>
</div>

    <!-- Display books in this div -->
    <div id="bookList">
        <!-- Book data will be displayed here dynamically -->
    </div>

    <button id="showBooksButton" onclick="showAllBooks()">Show All Books</button>

    <!-- Display books in this div -->
    <div id="bookshelf" class="bookshelf">
        <!-- Book data will be displayed here dynamically -->
    </div>


    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
